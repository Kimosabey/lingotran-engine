# Netlify configuration for the Lingotran Extraction Dashboard.
# Static site — no build step. The publishable site lives in ./site.

[build]
  publish = "site"

# Assets aren't fingerprinted (no build step), so never cache them long — a
# stale CSS/JS file mismatched against fresh HTML is exactly what breaks layout.
# Always revalidate; Netlify's ETag still makes repeat loads cheap (304s).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Friendly 404 -> home (optional; safe for this small doc site).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
